<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Incoming – Reel Tracking Utility</title>

  <link rel="stylesheet" href="../styles.css?v=2">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img id="brandLogo" src="../icon-1.png" />
    <img id="brandLogoRight" src="../icon-2.png">
    <div class="titles">
      <div class="appname">
        Reel Tracking Utility
        <div class="author-mark">
          Reel Tracking Utility – Chris Gagnon – 2026
        </div>
      </div>
    </div>
  </div>
</header>

<a href="../index.html" class="backBtn">← Main Page</a>

<main class="container">

<section class="card">
  <h2>Incoming / New (MCS use only)</h2>

  <!-- Intake -->
  <div id="incomingIntakeCard" class="card" style="margin-top:10px;">
    <h3 style="margin-top:0;">Intake information</h3>

    <div class="grid2">
      <div class="field">
        <label>Storage State</label>
        <select id="incomingState">
          <option value="">Required</option>
          <option value="ME">ME</option>
          <option value="NH">NH</option>
          <option value="VT">VT</option>
        </select>
      </div>

      <div class="field">
        <label>Storage Yard</label>
        <input id="incomingYard" type="text" placeholder="Required" />
      </div>

      <div class="field full">
        <label>BABA?</label>
        <select id="incomingBaba">
          <option value="">Required</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
    </div>

    <div class="row">
      <button id="incomingGoScan" class="primary bigAction" hidden>
        Start Scanning Reels
      </button>
    </div>
  </div>

  <!-- Scanner mount -->
  <div id="incomingScannerMount"></div>

  <!-- Session list -->
  <div class="card" style="margin-top:14px;">
    <h3>Incoming Session Reels <span id="incomingReelCount">(0)</span></h3>
    <div id="incomingReelList" class="list"></div>

    <div class="row" style="margin-top:14px;">
      <button id="incomingExport" class="primary bigAction" disabled>
        Done (Export)
      </button>
    </div>
  </div>
</section>
  
    </section>

<!-- ===== SCAN ===== -->
    <section id="scanSection" class="card" hidden>
  
  <!-- Incoming summary (only shown for Incoming mode) -->
  <div id="incomingSummaryCard" class="card" hidden style="margin-top:10px;">
    <h3 style="margin-top:0;">Incoming intake summary</h3>
    <div id="incomingSummaryText" style="line-height:1.5;"></div>
  </div>

  <div id="banner" class="banner" hidden></div>

      <div class="videoWrap">
        <video id="video" muted playsinline></video>
        <div class="scanGuide" aria-hidden="true"></div>
      </div>

       <div class="row scanControls">
       <button id="startScan" class="primary bigAction">Scan</button>
       <button id="flashBtn" class="ghost lightBtn" disabled>Flashlight</button>
       <button id="stopScan" class="secondary" disabled>Finished</button>
    </div>

      <div class="manualAddRow">
  <input
    id="manualReelInput"
    type="text"
    placeholder="Enter Reel Name (manual)"
    autocomplete="off"
  />
  <button id="manualAddBtn" type="button">Add</button>
</div>

        <div class="card">
        <h3>Session Reels <span id="reelCount">(0)</span></h3>
          
        <div id="undoBar" class="undoBar" hidden>
          <span id="undoText" class="undoText">Removed.</span>
          <button id="undoBtn" type="button" class="undoBtn">Undo</button>
      </div>

        <div id="reelList" class="list"></div>

        <div class="row exportRow">
          <button id="exportPickupCsv" class="primary" disabled>Export Pick Up / Deliver CSV</button>
          <button id="clearSession" class="ghost danger clearBtn" disabled>
         🗑 <span>Clear Session</span>
    </button>

          
        </div>
      </div>

    </section>
  
<script src="../js/incoming.js?v=3"></script>

</body>
</html>
