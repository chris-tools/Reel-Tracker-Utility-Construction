<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Incoming – Reel Tracking Utility</title>

  <link rel="stylesheet" href="../styles.css?v=2">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img id="brandLogo" src="../icon-1.png" />
    <img id="brandLogoRight" src="../icon-2.png">
    <div class="titles">
      <div class="appname">
        Reel Tracking Utility
        <div class="author-mark">
          Reel Tracking Utility – Chris Gagnon – 2026
        </div>
      </div>
    </div>
  </div>
</header>

<a href="../index.html" class="backBtn">← Main Page</a>

<main class="container">

 <section class="card">
  <h2>Incoming / New (MCS use only)</h2>

  <!-- Intake -->
  <div style="margin-top:10px;">
      <h3>Intake information</h3>

      <div class="grid2">
        <div class="field">
          <label>Storage State</label>
          <select id="incomingState">
            <option value="">Required</option>
            <option value="ME">ME</option>
            <option value="NH">NH</option>
            <option value="VT">VT</option>
          </select>
        </div>

        <div class="field">
          <label>Storage Yard</label>
          <input id="incomingYard" type="text" placeholder="Required" />
        </div>

        <div class="field full">
          <label>BABA?</label>
          <select id="incomingBaba">
            <option value="">Required</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>
      </div>
    </div>

   <!-- Scan Button -->
<div class="row">
  <button id="incomingGoScan" class="primary bigAction" hidden>
    Start Scanning Reels
  </button>
</div>

<!-- HIDDEN UNTIL SCANNING -->
<div id="incomingSessionWrap" hidden>

  <div style="margin-top:10px;">
    <h3>Incoming Session Reels <span id="incomingReelCount">(0)</span></h3>
    <div id="incomingReelList" class="list"></div>
  </div>

  <div class="row" style="margin-top:14px;">
   <button id="incomingExport" class="primary bigAction" disabled hidden>
    Done (Export)
    </button>
  </div>

</div>

  </section>

</main>

<script src="../incoming.js?v=2"></script>

</body>
</html>
